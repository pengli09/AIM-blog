- title: "Sign Embedding Quantum Algorithms for Matrix Equations and Matrix Functions"
  authors:
    - "Yanqiao Wang"
    - "Jin-Peng Liu"
  venue: "arXiv preprint"
  links:
    - label: "arXiv"
      url: "https://arxiv.org/abs/2604.25333"
    - label: "DOI"
      url: "https://doi.org/10.48550/arXiv.2604.25333"
  summary_expert: "Develops a sign-embedding framework for operator-output quantum algorithms targeting matrix equations and matrix functions. The approach uses augmented matrices, half-plane matrix signs, logarithmic-sinc approximations, and rebalanced shifted inverse families to handle Sylvester-type equations, Lyapunov equations, matrix square roots, matrix geometric means, and Riccati equations."
  summary_public: "This work explores quantum algorithms for difficult matrix computations that appear in scientific computing and applied mathematics. Its main contribution is a reusable framework that may help quantum computers solve several families of matrix problems more systematically."

- title: "AI Mathematician as a Partner in Advancing Mathematical Discovery -- A Case Study in Homogenization Theory"
  authors:
    - "Yuanhang Liu"
    - "Beichen Wang"
    - "Peng Li"
    - "Yang Liu"
  venue: "arXiv preprint"
  links:
    - label: "arXiv"
      url: "https://arxiv.org/abs/2510.26380"
    - label: "DOI"
      url: "https://doi.org/10.48550/arXiv.2510.26380"
    - label: "Blog"
      url: "/en/posts/homogenization.theory/"
  summary_expert: "Studies AIM-assisted proof development for a homogenization-theory problem. The work combines autonomous reasoning trajectories with targeted human interventions to decompose the proof, select analytical tools, validate intermediate claims, and assemble a complete argument under human oversight."
  summary_public: "This case study shows how AIM can support mathematicians on a long and technical proof. AIM helps propose reasoning steps and organize the search, while human researchers guide, check, and refine the proof to maintain mathematical rigor."
