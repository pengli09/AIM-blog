- title: "Sign Embedding Quantum Algorithms for Matrix Equations and Matrix Functions"
  authors:
    - "Yanqiao Wang"
    - "Jin-Peng Liu"
  venue: "arXiv 预印本"
  links:
    - label: "arXiv"
      url: "https://arxiv.org/abs/2604.25333"
    - label: "DOI"
      url: "https://doi.org/10.48550/arXiv.2604.25333"
  summary: "该工作提出面向矩阵方程和矩阵函数的符号嵌入量子算法框架。方法围绕增广矩阵、半平面矩阵符号、logarithmic-sinc 近似以及移位逆族的重平衡展开，用统一思路处理 Sylvester 方程、Lyapunov 方程、矩阵平方根、矩阵几何平均和 Riccati 方程等结构化量子线性代数任务。"

